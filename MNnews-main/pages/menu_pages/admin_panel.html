<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | MNnews</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-container { max-width: 900px; margin: 50px auto; padding: 20px; background: #1e1e1e; border-radius: 10px; color: white; }
        .news-item { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .news-info { flex-grow: 1; margin-right: 15px; }
        .news-info h4 { margin: 0 0 5px 0; color: #3498db; }
        .news-info p { margin: 0; font-size: 0.9em; color: #ccc; }
        .news-actions button { margin-left: 10px; padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: background 0.2s; }
        .btn-edit { background: #f39c12; color: white; }
        .btn-edit:hover { background: #e67e22; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-delete:hover { background: #c0392b; }
        
        /* Модальное окно */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
        .modal-content { background: #333; margin: 5% auto; padding: 25px; width: 90%; max-width: 600px; border-radius: 8px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; transition: color 0.2s; }
        .close-modal:hover { color: white; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0 20px 0; background: #444; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #3498db; }
        textarea { height: 150px; resize: vertical; }
        .btn-save { background: #27ae60; color: white; padding: 12px 20px; border: none; cursor: pointer; border-radius: 4px; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        .btn-save:hover { background: #2ecc71; }
        .btn-create-new { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        .btn-create-new:hover { background: #2980b9; }
        h2 { color: white; border-bottom: 1px solid #444; padding-bottom: 10px; }
    </style>
</head>
<body>

    <!-- Навигация -->
    <header style="background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333;">
        <a href="/index.html" style="color: white; text-decoration: none; margin-right: 20px; font-weight: bold;">&larr; На главную</a>
        <span style="color: #aaa; font-weight: bold;">Админ-панель: Управление новостями</span>
    </header>

    <div class="admin-container">
        <button onclick="openEditor()" class="btn-create-new">+ Создать новую новость</button>
        
        <div id="newsList">
            <p style="color: #aaa; text-align: center;">Загрузка новостей...</p>
        </div>
    </div>

    <!-- Модальное окно редактора -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditor()">&times;</span>
            <h3 id="modalTitle">Редактор новости</h3>
            <input type="hidden" id="editId">
            <label for="editTitle" style="color: #ccc; font-size: 0.9em;">Заголовок:</label>
            <input type="text" id="editTitle" placeholder="Введите заголовок новости">
            
            <label for="editImage" style="color: #ccc; font-size: 0.9em;">Ссылка на изображение (URL):</label>
            <input type="text" id="editImage" placeholder="https://example.com/image.jpg">
            
            <label for="editContent" style="color: #ccc; font-size: 0.9em;">Текст новости:</label>
            <textarea id="editContent" placeholder="Введите текст новости..."></textarea>
            
            <button onclick="saveNews()" class="btn-save">Сохранить изменения</button>
        </div>
    </div>

    <script>
        const API_URL = '/api/news';
        let currentNews = [];

        // Проверка авторизации админа
        async function checkAdminAuth() {
            const username = localStorage.getItem('name');
            const isAdmin = localStorage.getItem('is_admin') === '1';
            
            if (!username || !isAdmin) {
                alert('Доступ запрещен. Войдите как администратор.');
                window.location.href = '/pages/menu_pages/login.html';
                return false;
            }
            return true;
        }

        // Загрузка списка новостей
        async function loadNewsList() {
            try {
                const res = await fetch(API_URL);
                currentNews = await res.json();
                renderNewsList();
            } catch (err) {
                console.error(err);
                document.getElementById('newsList').innerHTML = '<p style="color: red;">Ошибка загрузки новостей.</p>';
            }
        }

        // Отрисовка списка
        function renderNewsList() {
            const container = document.getElementById('newsList');
            if (currentNews.length === 0) {
                container.innerHTML = '<p style="color: #aaa; text-align: center;">Новостей пока нет. Создайте первую!</p>';
                return;
            }

            container.innerHTML = currentNews.map(news => `
                <div class="news-item">
                    <div class="news-info">
                        <h4>${news.title}</h4>
                        <p>${new Date(news.date).toLocaleDateString()} | ID: ${news.id}</p>
                    </div>
                    <div class="news-actions">
                        <button class="btn-edit" onclick="openEditor(${news.id})">Изменить</button>
                        <button class="btn-delete" onclick="deleteNews(${news.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        // Открытие редактора (создание или редактирование)
        function openEditor(id = null) {
            const modal = document.getElementById('editorModal');
            const titleInput = document.getElementById('editTitle');
            const imageInput = document.getElementById('editImage');
            const contentInput = document.getElementById('editContent');
            const idInput = document.getElementById('editId');
            const modalTitle = document.getElementById('modalTitle');

            if (id) {
                const news = currentNews.find(n => n.id === id);
                if (news) {
                    modalTitle.textContent = 'Редактирование новости';
                    titleInput.value = news.title;
                    imageInput.value = news.image || '';
                    contentInput.value = news.content;
                    idInput.value = news.id;
                }
            } else {
                modalTitle.textContent = 'Новая новость';
                titleInput.value = '';
                imageInput.value = '';
                contentInput.value = '';
                idInput.value = '';
            }

            modal.style.display = 'block';
        }

        // Закрытие редактора
        function closeEditor() {
            document.getElementById('editorModal').style.display = 'none';
        }

        // Сохранение новости
        async function saveNews() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('editTitle').value;
            const image = document.getElementById('editImage').value;
            const content = document.getElementById('editContent').value;
            const username = localStorage.getItem('name');

            if (!title || !content) {
                alert('Заголовок и текст обязательны!');
                return;
            }

            try {
                if (id) {
                    // Обновление существующей
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, image, actor: username })
                    });
                } else {
                    // Создание новой
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, image, actor: username })
                    });
                }
                closeEditor();
                loadNewsList();
            } catch (err) {
                console.error(err);
                alert('Ошибка сохранения!');
            }
        }

        // Удаление новости
        async function deleteNews(id) {
            if (!confirm('Вы уверены, что хотите удалить эту новость?')) return;
            
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                loadNewsList();
            } catch (err) {
                console.error(err);
                alert('Ошибка удаления!');
            }
        }

        // Инициализация
        if (checkAdminAuth()) {
            loadNewsList();
        }

        // Закрытие модалки по клику вне её
        window.onclick = function(event) {
            const modal = document.getElementById('editorModal');
            if (event.target == modal) {
                closeEditor();
            }
        }
    </script>
</body>
</html>
