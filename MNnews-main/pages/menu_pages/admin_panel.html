<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | MNnews</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        :root {
            --admin-bg: #0f141d;
            --admin-card-soft: #202b3a;
            --admin-border: rgba(255, 255, 255, 0.12);
            --admin-text: #f6f8ff;
            --admin-muted: #aebad3;
            --admin-accent: #32a5ff;
            --admin-accent-strong: #1f88d8;
            --admin-danger: #d1505d;
            --admin-danger-strong: #b63d4a;
            --admin-success: #30ba78;
            --admin-success-strong: #229e63;
            --admin-overlay: rgba(4, 8, 18, 0.75);
            --admin-shadow: 0 18px 38px rgba(0, 0, 0, 0.35);
        }
        body {
            background:
                radial-gradient(circle at 12% 2%, rgba(50, 165, 255, 0.18), transparent 34%),
                radial-gradient(circle at 90% 100%, rgba(48, 186, 120, 0.16), transparent 42%),
                var(--admin-bg);
            color: var(--admin-text);
        }
        .admin-container {
            max-width: 960px;
            margin: 40px auto;
            padding: 24px;
            background: linear-gradient(145deg, rgba(34, 47, 67, 0.92), rgba(19, 27, 38, 0.92));
            border: 1px solid var(--admin-border);
            border-radius: 18px;
            color: var(--admin-text);
            box-shadow: var(--admin-shadow);
            backdrop-filter: blur(6px);
        }
        .news-item {
            background: var(--admin-card-soft);
            border: 1px solid var(--admin-border);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .news-info { flex-grow: 1; margin-right: 8px; }
        .news-info h4 { margin: 0 0 5px 0; color: #6ac2ff; font-size: 1.05rem; }
        .news-info p { margin: 0; font-size: 0.9em; color: var(--admin-muted); }
        .news-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .news-actions button {
            margin: 0;
            padding: 9px 14px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            transition: transform 0.15s ease, filter 0.15s ease;
        }
        .news-actions button:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
        }
        .btn-edit { background: linear-gradient(120deg, #f6ad3e, #e48619); color: white; }
        .btn-delete { background: linear-gradient(120deg, var(--admin-danger), var(--admin-danger-strong)); color: white; }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: var(--admin-overlay);
            z-index: 1000;
            padding: 24px 14px;
        }
        .modal-content {
            background: linear-gradient(150deg, #212d3e, #171f2d);
            margin: 1% auto;
            padding: 24px;
            width: 100%;
            max-width: 680px;
            border-radius: 16px;
            border: 1px solid var(--admin-border);
            position: relative;
            box-shadow: var(--admin-shadow);
        }
        .modal-content h3 { margin: 0 0 14px; font-size: 1.35rem; }
        .editor-meta { margin: 0 0 18px; color: var(--admin-muted); font-size: 0.92rem; line-height: 1.45; }
        .field-group { margin-bottom: 14px; }
        .field-group label { display: block; color: #d3def4; font-size: 0.92rem; margin-bottom: 8px; font-weight: 600; }
        .editor-input,
        .editor-textarea {
            width: 100%;
            padding: 12px;
            background: rgba(12, 17, 26, 0.7);
            border: 1px solid rgba(170, 193, 236, 0.24);
            color: #f9fbff;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .editor-input:focus,
        .editor-textarea:focus {
            outline: none;
            border-color: var(--admin-accent);
            box-shadow: 0 0 0 3px rgba(50, 165, 255, 0.2);
        }
        .editor-textarea { min-height: 180px; resize: vertical; line-height: 1.5; }
        .field-hint { margin: 8px 0 0; color: var(--admin-muted); font-size: 0.82rem; }
        .close-modal { position: absolute; top: 12px; right: 16px; font-size: 30px; cursor: pointer; color: #9aa6bd; line-height: 1; transition: color 0.2s; }
        .close-modal:hover { color: white; }
        .btn-save {
            background: linear-gradient(120deg, var(--admin-success), var(--admin-success-strong));
            color: white;
            padding: 12px 20px;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.15s ease, filter 0.15s ease;
            margin-top: 8px;
        }
        .btn-save:hover {
            transform: translateY(-1px);
            filter: brightness(1.07);
        }
        .btn-create-new {
            background: linear-gradient(120deg, var(--admin-accent), var(--admin-accent-strong));
            color: #fff;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.15s ease, filter 0.15s ease;
        }
        .btn-create-new:hover {
            transform: translateY(-1px);
            filter: brightness(1.07);
        }
        @media (max-width: 700px) {
            .admin-container { margin: 24px 10px; padding: 16px; border-radius: 14px; }
            .news-item { flex-direction: column; align-items: flex-start; }
            .news-actions { width: 100%; }
            .news-actions button { flex: 1; }
            .modal-content { padding: 18px; }
        }
    </style>
</head>
<body>

    <!-- Навигация -->
    <header style="background: #111; padding: 15px; text-align: center; border-bottom: 1px solid #333;">
        <a href="/index.html" style="color: white; text-decoration: none; margin-right: 20px; font-weight: bold;">&larr; На главную</a>
        <span style="color: #aaa; font-weight: bold;">Админ-панель: Управление новостями</span>
    </header>

    <div class="admin-container">
        <button onclick="openEditor()" class="btn-create-new">+ Создать новую новость</button>
        
        <div id="newsList">
            <p style="color: #aaa; text-align: center;">Загрузка новостей...</p>
        </div>
    </div>

    <!-- Модальное окно редактора -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditor()">&times;</span>
            <h3 id="modalTitle">Редактор новости</h3>
            <p class="editor-meta">Заполните поля ниже и сохраните изменения. Текст можно разделять на абзацы пустой строкой.</p>
            <input type="hidden" id="editId">
            <div class="field-group">
                <label for="editTitle">Заголовок</label>
                <input class="editor-input" type="text" id="editTitle" placeholder="Введите заголовок новости">
            </div>
            <div class="field-group">
                <label for="editImage">Изображение (URL)</label>
                <input class="editor-input" type="text" id="editImage" placeholder="https://example.com/image.jpg">
                <p class="field-hint">Оставьте поле пустым, если картинка не нужна.</p>
            </div>
                        <div class="field-group">
                <label for="editCategory">Страница публикации</label>
                <select class="editor-input" id="editCategory">
                    <option value="current">Главная страница</option>
                    <option value="archive1">Архив новостей 1</option>
                    <option value="archive2">Архив новостей 2</option>
                </select>
            </div>
            <div class="field-group">
                <label for="editContent">Текст новости</label>
                <textarea class="editor-textarea" id="editContent" placeholder="Введите текст новости..."></textarea>
            </div>
            
            <button onclick="saveNews()" class="btn-save">Сохранить изменения</button>
        </div>
    </div>

    <script>
        const API_URL = '/api/news';
        let currentNews = [];
        const CATEGORY_LABELS = {
            current: 'Главная',
            archive1: 'Архив 1',
            archive2: 'Архив 2'
        };

        // Проверка авторизации админа
        async function checkAdminAuth() {
            const username = localStorage.getItem('name');
            const isAdmin = localStorage.getItem('is_admin') === '1';
            
            if (!username || !isAdmin) {
                alert('Доступ запрещен. Войдите как администратор.');
                window.location.href = '/pages/menu_pages/login.html';
                return false;
            }
            return true;
        }

        // Загрузка списка новостей
        async function loadNewsList() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) {
                    throw new Error('Failed to fetch news');
                }
                currentNews = await res.json();
                renderNewsList();
            } catch (err) {
                console.error(err);
                document.getElementById('newsList').innerHTML = '<p style="color: red;">Ошибка загрузки новостей. Проверьте подключение к серверу.</p>';
            }
        }

        // Отрисовка списка
        function renderNewsList() {
            const container = document.getElementById('newsList');
            if (currentNews.length === 0) {
                container.innerHTML = '<p style="color: #aaa; text-align: center;">Новостей пока нет. Создайте первую!</p>';
                return;
            }

            container.innerHTML = currentNews.map(news => `
                <div class="news-item">
                    <div class="news-info">
                        <h4>${news.title}</h4>
                        <p>${new Date(news.date).toLocaleDateString()} | ID: ${news.id} | ${CATEGORY_LABELS[news.category] || news.category || 'Главная'}</p>
                    </div>
                    <div class="news-actions">
                        <button class="btn-edit" onclick="openEditor(${news.id})">Изменить</button>
                        <button class="btn-delete" onclick="deleteNews(${news.id})">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        // Открытие редактора (создание или редактирование)
        function openEditor(id = null) {
            const modal = document.getElementById('editorModal');
            const titleInput = document.getElementById('editTitle');
            const imageInput = document.getElementById('editImage');
            const categoryInput = document.getElementById('editCategory');
            const contentInput = document.getElementById('editContent');
            const idInput = document.getElementById('editId');
            const modalTitle = document.getElementById('modalTitle');

            if (id) {
                const news = currentNews.find(n => n.id === id);
                if (news) {
                    modalTitle.textContent = 'Редактирование новости';
                    titleInput.value = news.title;
                    imageInput.value = news.image || '';
                    categoryInput.value = news.category || 'current';
                    // Если content - массив, объединяем в строку с разделением абзацев
                    contentInput.value = Array.isArray(news.content) ? news.content.join('\n\n') : news.content;
                    idInput.value = news.id;
                }
            } else {
                modalTitle.textContent = 'Новая новость';
                titleInput.value = '';
                imageInput.value = '';
                categoryInput.value = 'current';
                contentInput.value = '';
                idInput.value = '';
            }

            modal.style.display = 'block';
        }

        // Закрытие редактора
        function closeEditor() {
            document.getElementById('editorModal').style.display = 'none';
        }

        // Сохранение новости
        async function saveNews() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('editTitle').value.trim();
            const image = document.getElementById('editImage').value.trim();
            const category = document.getElementById('editCategory').value;
            const content = document.getElementById('editContent').value.trim();
            const username = localStorage.getItem('name');

            if (!title || !content) {
                alert('Заголовок и текст обязательны!');
                return;
            }

            try {
                if (id) {
                    // Обновление существующей
                    await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, image, category, actor: username })
                    });
                } else {
                    // Создание новой
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, content, image, category, actor: username })
                    });
                }
                closeEditor();
                loadNewsList();
            } catch (err) {
                console.error(err);
                alert('Ошибка сохранения!');
            }
        }

        // Удаление новости
        async function deleteNews(id) {
            const actor = localStorage.getItem('name');
            if (!confirm('Вы уверены, что хотите удалить эту новость?')) return;
            
            try {
                await fetch(`${API_URL}/${id}?actor=${encodeURIComponent(actor || '')}`, { method: 'DELETE' });
                loadNewsList();
            } catch (err) {
                console.error(err);
                alert('Ошибка удаления!');
            }
        }

        // Инициализация
        async function init() {
            const isAuth = await checkAdminAuth();
            if (!isAuth) return;
            
            // Проверяем, есть ли параметр edit в URL
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('edit');
            
            await loadNewsList();
            
            // Если есть ID для редактирования, открываем редактор
            if (editId) {
                setTimeout(() => {
                    openEditor(parseInt(editId));
                }, 300);
            }
        }
        
        init();

        // Закрытие модалки по клику вне её
        window.onclick = function(event) {
            const modal = document.getElementById('editorModal');
            if (event.target == modal) {
                closeEditor();
            }
        }
    </script>
</body>
</html>
