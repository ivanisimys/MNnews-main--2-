<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <img src="img/photo_2025-04-25_18-04-30.jpg" alt="Логотип MN News" class="logo">
            <ul class="menu">
                <li class="menu__item"><a href="index.html">Новости</a></li>
                <li class="menu__item"><a href="pages/menu_pages/AboutUs.html">О нас</a></li>
                <li class="menu__item"><a href="pages/menu_pages/media.html">Медиа раздел</a></li>
                <li class="menu__item login"><a href="pages/menu_pages/login.html">Вход</a></li>
            </ul>
        </header>

        <main>
            <h1 class="slider">Актуальные новости</h1>
            <div class="columns">
                <aside class="left-column">
                    <ul class="sub-menu">
                        <li class="sub-menu__item"><a href="index.html">Актуальные новости</a></li>
                        <li class="sub-menu__item"><a href="pages/news_archive1.html">Архив новостей 1</a></li>
                        <li class="sub-menu__item"><a href="pages/news_archive2.html">Архив новостей 2</a></li>
                    </ul>
                </aside>

                <div class="right-column" id="newsList" data-category="current">
                    <p class="col-1-of-3__p">Загрузка новостей...</p>
                </div>
            </div>
            
            <!-- Кнопка обновления для администраторов -->
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="if(window.refreshNews) window.refreshNews();" 
                        style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background 0.2s;"
                        onmouseover="this.style.background='#2980b9'" 
                        onmouseout="this.style.background='#3498db'">
                    🔄 Обновить список новостей
                </button>
            </div>
        </main>

        <footer>
            <p>Наши соцсети:</p>
            <p>TG: <a class="link_footer" href="https://t.me/MineNilla_news">https://t.me/MineNilla_news</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script src="js/news-list.js"></script>
</body>
</html>
